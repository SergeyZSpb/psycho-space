# psycho-space nginx site — TLS termination + reverse proxy to the app on :8080.
# Certificates are obtained by certbot in webroot mode (bootstrap.sh); this file
# owns the whole server config (certbot does NOT edit it).

server {
    listen 80;
    listen [::]:80;
    server_name psycho-space.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # http2 as a listen param (compatible with nginx 1.24 on Ubuntu 24.04;
    # the `http2 on;` directive only exists in nginx >= 1.25.1).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name psycho-space.ru;

    ssl_certificate     /etc/letsencrypt/live/psycho-space.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/psycho-space.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP allows the VK ID SDK (unpkg) and VK ID endpoints (OneTap iframe + fetch).
    # Revisit if OneTap needs more sources when wired up in P2.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; connect-src 'self' https://*.vk.ru https://id.vk.ru https://api.vk.com; frame-src https://id.vk.ru https://*.vk.ru; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; base-uri 'self'; form-action 'self'" always;

    client_max_body_size 2m;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
