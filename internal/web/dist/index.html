<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>психоспасе</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #faf7ff; color: #1a1030;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f0a1e; color: #ece6ff; }
      .card { background: #191233 !important; box-shadow: 0 0 60px #6b3fd455 !important; }
    }
    .card {
      max-width: 640px; margin: 24px; padding: 40px; border-radius: 20px;
      background: #fff; box-shadow: 0 10px 40px #6b3fd422; text-align: center;
    }
    h1 { font-size: clamp(28px, 6vw, 44px); margin: 0 0 8px; letter-spacing: -0.02em; }
    .slop { font-size: clamp(18px, 4vw, 26px); line-height: 1.5; margin: 16px 0; }
    .huh { opacity: 0.7; font-size: 14px; margin-top: 24px; }
    .glow { color: #8a5cf6; text-shadow: 0 0 20px #8a5cf699; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="glow">психоспасе</h1>
    <p class="slop">это супер нейрослоп приложулька оххх оххх психоспасе</p>
    <p class="huh">скоро тут будет вход и всякое интерактивное. а пока — вот эта страничка.</p>
  </main>
</body>
</html>
